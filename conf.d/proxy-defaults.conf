# ============================================================
# 全域代理預設參數 — 對齊後端 Apache / PHP 設定
# 此檔案的指令作用於 http 層級，所有 server block 均繼承。
# 若個別 server / location 有明確設定，則以該層設定為準。
# ============================================================

# ── 上傳限制 ─────────────────────────────────────────────────
# 對齊 PHP: upload_max_filesize = 128M, post_max_size = 128M
# 必須 >= post_max_size，否則大檔案在抵達 PHP 前就被 Nginx 攔截 (413)
client_max_body_size 128M;

# ── 代理逾時 ─────────────────────────────────────────────────
# 對齊 PHP: max_execution_time = 120s
# proxy_read_timeout: 等待後端回應的最長時間
# proxy_send_timeout: 向後端傳送請求的最長時間
proxy_read_timeout  120s;
proxy_send_timeout  120s;

# ── 代理 Buffer ──────────────────────────────────────────────
# 對齊 PHP: memory_limit = 512M，後端可能產生大量輸出
# 適當加大 buffer 可減少 Nginx 寫入暫存檔的頻率，提升效能
# proxy_buffer_size    : 讀取後端回應 header 的 buffer 大小
# proxy_buffers        : 讀取後端回應 body 的 buffer 數量與大小
# proxy_busy_buffers_size: 同時向客戶端傳送時可使用的最大 buffer
proxy_buffer_size        16k;
proxy_buffers            8 32k;
proxy_busy_buffers_size  64k;
