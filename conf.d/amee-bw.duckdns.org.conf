server {
    server_name amee-bw.duckdns.org;

    # 針對 Let's Encrypt 自動續簽的 ACME challenge 路徑
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 測試階段：LXC 下的 xampp 轉到 /test
    location /test/ {
        proxy_pass http://10.1.0.100:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI 微服務 (保持 /api 路徑不被截斷)
    location /api/ {
        proxy_pass http://10.1.0.101:80; # 不加結尾斜線，原樣傳遞 /api/...
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI 預設文檔路由在 /docs，使用者習慣用 /api/docs 訪問
    location = /api/docs {
        proxy_pass http://10.1.0.101:80/docs;
        proxy_set_header Host $host;
    }

    # 確保 FastAPI 預設的 openapi.json 能夠正確存取
    location = /openapi.json {
        proxy_pass http://10.1.0.101:80/openapi.json;
        proxy_set_header Host $host;
    }

    # 測試階段：Windows-xampp 直接掛到根目錄
    location / {
        proxy_pass http://10.1.0.200:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/amee-bw.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/amee-bw.duckdns.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    listen 80;
    server_name amee-bw.duckdns.org;

    # ACME challenge 不做跳轉
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # /check 保持 HTTP，直接轉發至 Windows XAMPP
    location /check {
        proxy_pass http://10.1.0.200:80/check;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其餘所有 HTTP 請求強制跳轉至 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}