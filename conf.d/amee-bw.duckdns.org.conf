server {
    server_name amee-bw.duckdns.org;

    # 針對 Let's Encrypt 自動續簽的 ACME challenge 路徑
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 測試階段：LXC 下的 xampp 轉到 /test
    location /test/ {
        proxy_pass http://10.1.0.100:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI 預留配置 (目前未指定路徑，先註解或保留為特定路徑)
    location /api/ {
        proxy_pass http://10.1.0.101:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;

        # 透過 Nginx 強制覆寫 FastAPI 回傳的內容，免改後端程式碼
        proxy_set_header Accept-Encoding ""; # 確保後端不壓縮，讓 Nginx 能修改內容
        # 1. 修正 Swagger UI HTML 裡的 openapi.json 路徑
        sub_filter '"/openapi.json"' '"/api/openapi.json"';
        # 2. 修正 OpenAPI JSON 裡的伺服器基底路徑 (解決 Try it out 請求打錯地方的問題)
        sub_filter '{"openapi":"3.1.0","info":' '{"openapi":"3.1.0","servers":[{"url":"/api"}],"info":';
        sub_filter '{"openapi":"3.0.2","info":' '{"openapi":"3.0.2","servers":[{"url":"/api"}],"info":';
        sub_filter_once off;
        sub_filter_types text/html application/json;
    }

    # 測試階段：Windows-xampp 直接掛到根目錄
    location / {
        proxy_pass http://10.1.0.200:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/amee-bw.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/amee-bw.duckdns.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = amee-bw.duckdns.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name amee-bw.duckdns.org;
    return 404; # managed by Certbot


}