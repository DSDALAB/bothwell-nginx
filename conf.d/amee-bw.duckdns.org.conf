server {
    server_name amee-bw.duckdns.org;

    # 針對 Let's Encrypt 自動續簽的 ACME challenge 路徑
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 測試階段：LXC 下的 xampp 轉到 /test
    location /test/ {
        proxy_pass http://10.1.0.100:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI 預留配置 (目前未指定路徑，先註解或保留為特定路徑)
    location /api/ {
        proxy_pass http://10.1.0.101:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;
    }

    # 測試階段：Windows-xampp 直接掛到根目錄
    location / {
        proxy_pass http://10.1.0.200:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/amee-bw.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/amee-bw.duckdns.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = amee-bw.duckdns.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name amee-bw.duckdns.org;
    return 404; # managed by Certbot


}