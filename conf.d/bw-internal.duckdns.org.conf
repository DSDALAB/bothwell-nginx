# bw-internal.duckdns.org — 內網域名，與 amee-bw.duckdns.org 代理到相同後端
# 適用於內網設備存取，不主動跳轉 HTTP→HTTPS

# HTTPS 伺服器區塊
server {
    listen 443 ssl;
    server_name bw-internal.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/bw-internal.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bw-internal.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 測試階段：LXC 下的 xampp 轉到 /test
    location /test/ {
        proxy_pass http://10.1.0.100:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI 微服務 (保持 /api 路徑不被截斷)
    location /api/ {
        proxy_pass http://10.1.0.101:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/docs {
        proxy_pass http://10.1.0.101:80/docs;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://10.1.0.101:80/openapi.json;
        proxy_set_header Host $host;
    }

    # 根目錄轉發至 Windows XAMPP
    location / {
        proxy_pass http://10.1.0.200:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP 伺服器區塊 (不跳轉，直接服務)
server {
    listen 80;
    server_name bw-internal.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 測試階段：LXC 下的 xampp 轉到 /test
    location /test/ {
