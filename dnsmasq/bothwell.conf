# /etc/dnsmasq.d/bothwell.conf
# Bothwell 內網 DNS 設定

# 只監聽內網介面，不監聽外部
interface=eth1
interface=lo

# 不監聽 eth0 (Proxmox 橋接，視需求可開啟)
# interface=eth0

# 上游 DNS 伺服器 (網路正常時轉發一般查詢)
server=8.8.8.8
server=1.1.1.1

# 快取 DNS 查詢 (加速解析)
cache-size=1000

# 不讀 /etc/hosts 以外的本地設定 (讓 dnsmasq.d 完全控制)
no-hosts

# 本地域名覆蓋 (靜態 override)
# 檔案由 duckdns-sync.sh 動態更新，此處為初始值
address=/amee-bw.duckdns.org/192.168.246.251
address=/bw-internal.duckdns.org/192.168.246.251

# Log (可選，除錯用)
# log-queries
# log-facility=/var/log/dnsmasq.log
